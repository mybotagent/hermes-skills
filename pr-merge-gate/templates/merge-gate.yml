# hermes-pr-gate merge gate — verified 2026-07-06 on mybotagent/hermes-pr-gate.
# Purpose: When status checks pass AND the PR is mergeable, the workflow
# auto-merges (squash). Otherwise it leaves a structured comment and exits.
#
# Notes (see SKILL.md "Auto-merge 실행 — workflow에서 merge 권한 함정"):
#   * GITHUB_TOKEN cannot approve a PR authored by itself, but CAN merge.
#   * gh api -f sends booleans as strings; use -F or raw JSON.
#   * mergeable_state transient values (unstable, behind) must PASS, not fail.
#
# Drop this file into a hub repo's .github/workflows/ via `git push` (fine-grained
# token with Workflows R&W). The classic PAT works for opening the PR that
# imports this workflow.

name: merge-gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to gate"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  smoke:
    name: ci / smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Python import smoke
        run: python3 -c "import json,pathlib; print('python OK', pathlib.Path('.').resolve().name)"
      - name: Files present
        run: |
          test -f README.md
          test -d .github/workflows
          ls -la .github/workflows
          echo "structure OK"

  gate:
    name: merge gate
    runs-on: ubuntu-latest
    needs: [smoke]
    timeout-minutes: 3
    steps:
      - name: Verdict
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
        run: |
          if [ -z "$PR_NUMBER" ]; then
            echo "::error::No PR number resolvable"
            exit 1
          fi
          echo "gating PR #$PR_NUMBER"
          resp=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER" --jq '.mergeable,.mergeable_state')
          mergeable=$(echo "$resp" | head -1)
          state=$(echo "$resp" | tail -1)
          echo "mergeable=$mergeable state=$state"
          case "$state" in
            clean|unstable|behind)
              echo "mergeable_state acceptable: $state"
              ;;
            blocked|dirty)
              echo "::error::mergeable_state blocked/dirty: $state"
              exit 1
              ;;
            *)
              echo "::error::mergeable_state unexpected: $state"
              exit 1
              ;;
          esac
      - name: Auto-merge (squash)
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
        run: |
          echo "auto-merging PR #$PR_NUMBER (squash)"
          # IMPORTANT: use -F (typed) not -f for boolean squash.
          gh api -X PUT "repos/${{ github.repository }}/pulls/$PR_NUMBER/merge" \
            -F commit_title="merge: auto squash #${PR_NUMBER} via merge-gate" \
            -F commit_message="merge-gate: smoke green + mergeable acceptable" \
            -F squash=true
